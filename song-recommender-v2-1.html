<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe & Play</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --border: #2a2a3a;
  --accent: #c8f55a;
  --accent2: #f55ac8;
  --text: #e8e8f0;
  --muted: #666680;
  --card: #18181f;
  --card-hover: #1c1c26;
  --danger: #f55a5a;
  --info: #5ab4f5;
}

[data-theme="light"] {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --border: #ddddd0;
  --text: #1a1a2e;
  --muted: #888899;
  --card: #ffffff;
  --card-hover: #f9f9f4;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* Layout */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 10;
  transition: transform 0.3s, background 0.3s;
}

.main {
  flex: 1;
  margin-left: 280px;
  padding: 40px 40px 80px;
  max-width: calc(100vw - 280px);
}

/* Sidebar toggle for mobile */
.sidebar-toggle {
  display: none;
  position: fixed;
  top: 16px; left: 16px;
  z-index: 100;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  width: 40px; height: 40px;
  cursor: pointer;
  font-size: 1.1rem;
  color: #0a0a0f;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.theme-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 8px 12px;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

/* Section labels */
.section-label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Prefs */
.pref-row { margin-bottom: 14px; }

select, input[type="text"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
select:focus, input[type="text"]:focus { border-color: var(--accent); }

/* Saved playlists sidebar */
.playlist-list { display: flex; flex-direction: column; gap: 8px; }

.playlist-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.playlist-item:hover { border-color: var(--accent); }
.playlist-item-name { font-size: 0.8rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.playlist-item-count { font-size: 0.7rem; color: var(--muted); }
.playlist-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; border-radius: 4px; transition: color 0.2s; }
.playlist-del:hover { color: var(--danger); }

.no-playlists { font-size: 0.75rem; color: var(--muted); text-align: center; padding: 12px 0; }

/* Main content */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 32px;
  transition: background 0.3s;
}

textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  padding: 16px 18px;
  resize: none;
  height: 90px;
  outline: none;
  transition: border-color 0.3s;
  line-height: 1.6;
}
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: var(--accent); }

.mood-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.pill {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,245,90,0.05); }

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
}

.btn-primary {
  flex: 1;
  min-width: 160px;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #0a0a0f;
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: #d8ff70; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(200,245,90,0.2); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-secondary {
  padding: 14px 18px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

/* Loader */
.loader { display: none; text-align: center; padding: 48px 0; }
.loader.visible { display: block; }
.vinyl {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: conic-gradient(#1a1a1a 0deg,#2a2a2a 20deg,#1a1a1a 40deg,#2a2a2a 60deg,#1a1a1a 80deg,#2a2a2a 100deg,#1a1a1a 120deg,#2a2a2a 140deg,#1a1a1a 160deg,#2a2a2a 180deg,#1a1a1a 200deg,#2a2a2a 220deg,#1a1a1a 240deg,#2a2a2a 260deg,#1a1a1a 280deg,#2a2a2a 300deg,#1a1a1a 320deg,#2a2a2a 340deg,#1a1a1a 360deg);
  margin: 0 auto 14px;
  position: relative;
  animation: spin 2s linear infinite;
}
.vinyl::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; background:var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* Results */
.results { display: none; }
.results.visible { display: block; animation: fadeUp 0.4s ease both; }

.results-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}

.results-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.results-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  padding: 7px 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Save playlist modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 340px;
  animation: fadeUp 0.3s ease both;
}
.modal h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 16px; }
.modal input { margin-bottom: 14px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns .btn-primary { font-size: 0.75rem; padding: 12px; }
.modal-cancel { padding: 12px 18px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
.modal-cancel:hover { color: var(--text); border-color: var(--text); }

/* Song cards */
.songs-grid { display: flex; flex-direction: column; gap: 10px; }

.song-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.25s;
  animation: slideIn 0.35s ease both;
}
.song-card:hover { border-color: rgba(200,245,90,0.25); background: var(--card-hover); transform: translateX(3px); }

@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

.song-num { font-size: 0.7rem; color: var(--accent); min-width: 20px; opacity: 0.6; }
.song-info { flex: 1; min-width: 0; }
.song-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.song-artist { font-size: 0.72rem; color: var(--muted); }
.song-vibe { font-size: 0.65rem; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; text-align: right; min-width: 90px; max-width: 110px; }

.song-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.song-card:hover .song-actions { opacity: 1; }

.song-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 5px 8px;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.song-btn:hover { color: var(--text); border-color: var(--text); }
.song-btn.spotify:hover { color: #1db954; border-color: #1db954; }
.song-btn.youtube:hover { color: #ff0000; border-color: #ff0000; }
.song-btn.swap:hover { color: var(--accent2); border-color: var(--accent2); }
.song-btn.more:hover { color: var(--accent); border-color: var(--accent); }

/* Why panel */
.why-panel {
  display: none;
  background: rgba(200,245,90,0.04);
  border: 1px solid rgba(200,245,90,0.15);
  border-radius: 0 0 10px 10px;
  padding: 12px 16px;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.6;
  margin-top: -4px;
  animation: fadeUp 0.2s ease both;
}
.why-panel.visible { display: block; }

/* History section */
.history-section { margin-top: 40px; }
.history-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.history-item:hover { border-color: var(--accent); }
.history-mood { font-size: 0.82rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-meta { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #0a0a0f;
  font-size: 0.78rem;
  padding: 10px 22px;
  border-radius: 100px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 999;
  letter-spacing: 0.5px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Error */
.error-msg { display: none; background: rgba(245,90,90,0.08); border: 1px solid rgba(245,90,90,0.2); border-radius: 10px; padding: 14px 18px; font-size: 0.78rem; color: var(--danger); margin-top: 14px; text-align: center; }
.error-msg.visible { display: block; }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 70px 20px 60px; max-width: 100vw; }
  .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
  .song-actions { opacity: 1; }
}
</style>
</head>
<body data-theme="dark">

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="section-label">Preferences</div>
      <div class="pref-row">
        <div class="section-label" style="margin-bottom:6px">Favorite Genre</div>
        <select id="genrePref">
          <option value="">Any genre</option>
          <option value="pop">Pop</option>
          <option value="hip-hop">Hip-Hop</option>
          <option value="r&b">R&B</option>
          <option value="rock">Rock</option>
          <option value="indie">Indie</option>
          <option value="electronic">Electronic</option>
          <option value="jazz">Jazz</option>
          <option value="classical">Classical</option>
          <option value="country">Country</option>
          <option value="latin">Latin</option>
          <option value="metal">Metal</option>
          <option value="folk">Folk</option>
        </select>
      </div>
      <div class="pref-row">
        <div class="section-label" style="margin-bottom:6px">Energy Level</div>
        <select id="energyPref">
          <option value="">Any energy</option>
          <option value="very chill, low energy">Very Chill</option>
          <option value="relaxed, mellow">Relaxed</option>
          <option value="medium energy">Medium</option>
          <option value="upbeat, energetic">Upbeat</option>
          <option value="high energy, hype">High Energy</option>
        </select>
      </div>
      <div class="pref-row">
        <div class="section-label" style="margin-bottom:6px">Favorite Artist (optional)</div>
        <input type="text" id="artistPref" placeholder="e.g. Frank Ocean">
      </div>
    </div>

    <div>
      <div class="section-label">Saved Playlists</div>
      <div class="playlist-list" id="playlistList">
        <div class="no-playlists" id="noPlaylists">No saved playlists yet</div>
      </div>
    </div>

    <div style="margin-top:auto; padding-top:16px; border-top: 1px solid var(--border);">
      <div class="section-label" style="margin-bottom:10px">Theme</div>
      <button class="theme-btn" onclick="toggleTheme()" style="width:100%">🌙 Toggle Light / Dark</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header>
      <div class="logo">Vibe & Play</div>
    </header>

    <!-- Input Card -->
    <div class="input-card">
      <div class="section-label">How are you feeling right now?</div>
      <textarea id="mood" placeholder="e.g. rainy afternoon, nostalgic and a little melancholy..."></textarea>

      <div class="mood-pills">
        <button class="pill" onclick="setMood('late night drive, windows down')">late night drive</button>
        <button class="pill" onclick="setMood('cozy rainy day at home')">cozy rainy day</button>
        <button class="pill" onclick="setMood('hype and energetic, ready to go')">hype & energetic</button>
        <button class="pill" onclick="setMood('heartbroken and reflective')">heartbroken</button>
        <button class="pill" onclick="setMood('summer golden hour, carefree')">summer golden hour</button>
        <button class="pill" onclick="setMood('deep focus, studying or working')">deep focus</button>
        <button class="pill" onclick="surpriseMe()">✦ surprise me</button>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="submitBtn" onclick="getSongs()">
          <span>✦</span> Find My Songs
        </button>
        <button class="btn-secondary" onclick="copyPlaylist()" id="copyBtn" style="display:none">
          📋 Copy List
        </button>
        <button class="btn-secondary" onclick="showSaveModal()" id="saveBtn" style="display:none">
          💾 Save Playlist
        </button>
      </div>
      <div class="error-msg" id="errorMsg">Something went wrong. Please try again.</div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="vinyl"></div>
      <div class="loader-text">Tuning into your vibe...</div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="results-toolbar">
        <span class="section-label" id="resultsLabel">Your playlist</span>
        <div class="results-actions">
          <button class="icon-btn" onclick="copyPlaylist()">📋 Copy</button>
          <button class="icon-btn" onclick="showSaveModal()">💾 Save</button>
        </div>
      </div>
      <div class="songs-grid" id="songsGrid"></div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="section-label">Recent Searches</div>
      <div class="history-grid" id="historyGrid"></div>
    </div>
  </main>
</div>

<!-- Save Playlist Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>Save Playlist</h3>
    <input type="text" id="playlistName" placeholder="e.g. Monday Morning Commute">
    <div class="modal-btns">
      <button class="btn-primary" onclick="savePlaylist()">Save</button>
      <button class="modal-cancel" onclick="hideSaveModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
let currentSongs = [];
let currentMood = '';
let history = JSON.parse(localStorage.getItem('vp_history') || '[]');
let playlists = JSON.parse(localStorage.getItem('vp_playlists') || '[]');

const SURPRISE_MOODS = [
  "walking through a neon-lit city at 2am",
  "first day of spring, everything feels new",
  "bittersweet nostalgia, remembering old friends",
  "feeling unstoppable and ready to take on the world",
  "lazy sunday morning with coffee and sunlight",
  "missing someone you can't call anymore",
  "dancing alone in your room like nobody's watching",
  "end of a long road trip, watching the sunset",
  "falling in love for the first time",
  "cozy winter night by the fireplace"
];

// Init
renderPlaylists();
renderHistory();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function toggleTheme() {
  const body = document.body;
  body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
}

function setMood(text) {
  document.getElementById('mood').value = text;
  document.getElementById('mood').focus();
}

function surpriseMe() {
  const mood = SURPRISE_MOODS[Math.floor(Math.random() * SURPRISE_MOODS.length)];
  setMood(mood);
  getSongs();
}

async function getSongs(customMood) {
  const mood = customMood || document.getElementById('mood').value.trim();
  if (!mood) { document.getElementById('mood').focus(); return; }

  currentMood = mood;
  const genre = document.getElementById('genrePref').value;
  const energy = document.getElementById('energyPref').value;
  const artist = document.getElementById('artistPref').value.trim();

  const btn = document.getElementById('submitBtn');
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  loader.classList.add('visible');
  results.classList.remove('visible');
  errorMsg.classList.remove('visible');
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';

  let prompt = `You are a music curator. Based on this mood/vibe: "${mood}"`;
  if (genre) prompt += `\nPreferred genre: ${genre}`;
  if (energy) prompt += `\nEnergy level: ${energy}`;
  if (artist) prompt += `\nThe user likes artists similar to: ${artist}`;
  prompt += `\n\nRecommend exactly 8 songs. Return ONLY a JSON array, no markdown, no preamble. Format:
[{"title":"Song Title","artist":"Artist Name","vibe":"2-3 word vibe tag","why":"One sentence explaining why this matches the mood"}]`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const songs = JSON.parse(clean);

    currentSongs = songs;
    renderSongs(songs);
    addToHistory(mood);

    document.getElementById('copyBtn').style.display = '';
    document.getElementById('saveBtn').style.display = '';
  } catch (err) {
    errorMsg.classList.add('visible');
  } finally {
    btn.disabled = false;
    loader.classList.remove('visible');
  }
}

function renderSongs(songs, label) {
  const grid = document.getElementById('songsGrid');
  const resultsLabel = document.getElementById('resultsLabel');
  const results = document.getElementById('results');

  grid.innerHTML = '';
  resultsLabel.textContent = label || `${songs.length} songs for your vibe`;

  songs.forEach((song, i) => {
    const card = document.createElement('div');
    card.style.animationDelay = `${i * 0.06}s`;

    const spotifyUrl = `https://open.spotify.com/search/${encodeURIComponent(song.title + ' ' + song.artist)}`;
    const youtubeUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(song.title + ' ' + song.artist)}`;

    card.innerHTML = `
      <div class="song-card" id="card-${i}">
        <div class="song-num">0${i+1}</div>
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          <div class="song-artist">${song.artist}</div>
        </div>
        <div class="song-vibe">${song.vibe}</div>
        <div class="song-actions">
          <button class="song-btn more" onclick="moreLikeThis(${i})" title="More like this">✦ More</button>
          <button class="song-btn" onclick="toggleWhy(${i})" title="Why this song?">💬 Why?</button>
          <button class="song-btn swap" onclick="swapSong(${i})" title="Swap this song">↻ Swap</button>
          <a class="song-btn spotify" href="${spotifyUrl}" target="_blank" title="Open in Spotify">Spotify</a>
          <a class="song-btn youtube" href="${youtubeUrl}" target="_blank" title="Search on YouTube">YT</a>
        </div>
      </div>
      <div class="why-panel" id="why-${i}">${song.why || 'This song matches your vibe.'}</div>
    `;
    grid.appendChild(card);
  });

  results.classList.add('visible');
}

function toggleWhy(i) {
  const panel = document.getElementById(`why-${i}`);
  panel.classList.toggle('visible');
}

async function moreLikeThis(i) {
  const song = currentSongs[i];
  const newMood = `similar to "${song.title}" by ${song.artist}, matching the vibe: ${currentMood}`;
  document.getElementById('mood').value = newMood;
  await getSongs(newMood);
}

async function swapSong(i) {
  const song = currentSongs[i];
  showToast('Finding a replacement...');

  const prompt = `Suggest ONE song similar to "${song.title}" by ${song.artist} that fits this mood: "${currentMood}". Return ONLY a JSON object (no array, no markdown):
{"title":"Song Title","artist":"Artist Name","vibe":"2-3 word vibe tag","why":"One sentence explaining why this matches the mood"}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const newSong = JSON.parse(clean);

    currentSongs[i] = newSong;
    renderSongs(currentSongs);
    showToast('Song swapped!');
  } catch {
    showToast('Swap failed, try again');
  }
}

function copyPlaylist() {
  if (!currentSongs.length) return;
  const text = currentSongs.map((s, i) => `${i+1}. ${s.title} — ${s.artist}`).join('\n');
  const full = `🎵 My Vibe & Play playlist (${currentMood}):\n\n${text}`;
  navigator.clipboard.writeText(full).then(() => showToast('Playlist copied!'));
}

function showSaveModal() {
  if (!currentSongs.length) return;
  document.getElementById('playlistName').value = '';
  document.getElementById('saveModal').classList.add('visible');
  setTimeout(() => document.getElementById('playlistName').focus(), 100);
}

function hideSaveModal() {
  document.getElementById('saveModal').classList.remove('visible');
}

function savePlaylist() {
  const name = document.getElementById('playlistName').value.trim();
  if (!name) return;

  playlists.unshift({ name, mood: currentMood, songs: currentSongs, date: Date.now() });
  if (playlists.length > 20) playlists.pop();
  localStorage.setItem('vp_playlists', JSON.stringify(playlists));

  hideSaveModal();
  renderPlaylists();
  showToast(`Saved "${name}"!`);
}

function renderPlaylists() {
  const list = document.getElementById('playlistList');
  const none = document.getElementById('noPlaylists');

  if (!playlists.length) {
    none.style.display = '';
    list.querySelectorAll('.playlist-item').forEach(el => el.remove());
    return;
  }

  none.style.display = 'none';
  list.querySelectorAll('.playlist-item').forEach(el => el.remove());

  playlists.forEach((pl, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item';
    item.innerHTML = `
      <span class="playlist-item-name">${pl.name}</span>
      <span class="playlist-item-count">${pl.songs.length}</span>
      <button class="playlist-del" onclick="deletePlaylist(${i}, event)">✕</button>
    `;
    item.addEventListener('click', () => loadPlaylist(i));
    list.appendChild(item);
  });
}

function loadPlaylist(i) {
  const pl = playlists[i];
  currentSongs = pl.songs;
  currentMood = pl.mood;
  document.getElementById('mood').value = pl.mood;
  renderSongs(pl.songs, pl.name);
  document.getElementById('copyBtn').style.display = '';
  document.getElementById('saveBtn').style.display = '';
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function deletePlaylist(i, e) {
  e.stopPropagation();
  playlists.splice(i, 1);
  localStorage.setItem('vp_playlists', JSON.stringify(playlists));
  renderPlaylists();
  showToast('Playlist deleted');
}

function addToHistory(mood) {
  history = history.filter(h => h.mood !== mood);
  history.unshift({ mood, date: Date.now() });
  if (history.length > 8) history.pop();
  localStorage.setItem('vp_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const grid = document.getElementById('historyGrid');
  if (!history.length) { section.style.display = 'none'; return; }

  section.style.display = '';
  grid.innerHTML = '';

  history.forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const date = new Date(h.date);
    const label = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    item.innerHTML = `
      <span class="history-mood">${h.mood}</span>
      <span class="history-meta">${label}</span>
    `;
    item.onclick = () => {
      document.getElementById('mood').value = h.mood;
      getSongs(h.mood);
    };
    grid.appendChild(item);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// Keyboard shortcut
document.getElementById('mood').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); getSongs(); }
});

// Close modal on overlay click
document.getElementById('saveModal').addEventListener('click', e => {
  if (e.target === document.getElementById('saveModal')) hideSaveModal();
});

// Close sidebar on outside click (mobile)
document.addEventListener('click', e => {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.querySelector('.sidebar-toggle');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
    sidebar.classList.remove('open');
  }
});
</script>
</body>
</html>
